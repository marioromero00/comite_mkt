<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campaign Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f0f4f8;
      --surface:   #ffffff;
      --border:    #dde3ea;
      --text:      #1e293b;
      --muted:     #64748b;
      --accent:    #00a859;
      --accent-dim:#e6f6ee;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Topbar ─────────────────────────────────────── */
    .topbar {
      padding: 1.25rem 2rem 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .topbar h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 1rem;
      letter-spacing: -0.01em;
    }

    .tabs {
      display: flex;
      gap: 0;
      overflow-x: auto;
    }

    .tab {
      padding: 0.6rem 1.25rem;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Pages ──────────────────────────────────────── */
    .page { display: none; padding: 2rem; max-width: 1100px; margin: 0 auto; }
    .page.active { display: block; }

    .page-header { margin-bottom: 1.75rem; }
    .page-header h2 { font-size: 1.4rem; font-weight: 700; color: #1e293b; }
    .page-header p  { margin-top: 0.25rem; font-size: 0.82rem; color: var(--muted); }

    /* ── Hero stats ─────────────────────────────────── */
    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .hero-stat { padding: 0 1.75rem; border-left: 1px solid var(--border); }
    .hero-stat:first-child { padding-left: 0; border-left: none; }

    .hero-value {
      font-size: 1.95rem;
      font-weight: 700;
      color: #1e293b;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .hero-label {
      margin-top: 0.4rem;
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    /* ── Layout rows ────────────────────────────────── */
    .row      { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; margin-bottom: 2.5rem; }
    .row-full { margin-bottom: 2.5rem; }
    @media (max-width: 700px) { .row { grid-template-columns: 1fr; gap: 2rem; } }

    /* ── Sections (no boxes — separated by whitespace) ─ */
    .section-title {
      font-size: 0.92rem;
      font-weight: 600;
      color: #1e293b;
      letter-spacing: -0.01em;
      margin-bottom: 1.25rem;
      line-height: 1.35;
    }

    /* ── Gender bar ─────────────────────────────────── */
    .gender-bar {
      height: 28px;
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      margin-bottom: 0.65rem;
    }

    .gender-f { background: #f472b6; }
    .gender-m { background: #38bdf8; }

    .gender-legend { display: flex; gap: 1.25rem; font-size: 0.85rem; align-items: center; }

    .gender-symbol {
      font-size: 1.1rem;
      font-weight: 700;
      margin-right: 0.25rem;
      line-height: 1;
      vertical-align: middle;
    }

    /* ── Clientes nuevos — cifras destacadas ─────────── */
    .nuevos-stats { display: flex; gap: 2.5rem; flex-wrap: wrap; }

    .nuevo-stat-value { font-size: 1.7rem; font-weight: 700; color: var(--accent); line-height: 1; letter-spacing: -0.02em; }
    .nuevo-stat-pct   { font-size: 0.8rem; color: var(--text); margin-top: 0.35rem; }
    .nuevo-stat-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.15rem; }

    /* ── Status ─────────────────────────────────────── */
    .status { text-align: center; padding: 4rem; color: var(--muted); font-size: 0.875rem; }
    .error  { color: #f87171; }
  </style>
</head>
<body>

<div class="topbar">
  <h1>Campaign Dashboard</h1>
  <div class="tabs" id="tabs"></div>
</div>

<div id="pages">
  <div class="status" id="loading">Cargando campañas…</div>
</div>

<script>
  const fmt = {
    num: n => Number(n).toLocaleString("es-CL"),
    clp: n => "$" + Number(n).toLocaleString("es-CL"),
    clpM: n => "$" + (Number(n) / 1_000_000).toFixed(1) + "M",
  };

  const MESES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  function fmtFecha(iso) {
    const d = new Date(iso + "T00:00:00");
    return `${d.getDate()} ${MESES[d.getMonth()]}`;
  }

  const CHART_COLOR = "#00a859";

  let chartInstances = [];

  function makeChart(id, type, data, options) {
    const chart = new Chart(document.getElementById(id), { type, data, options });
    chartInstances.push(chart);
    return chart;
  }

  function makeHBarChart(id, labels, values, valueFmt) {
    const tickStyle = { color: "#64748b", font: { size: 11 } };
    return makeChart(id, "bar", {
      labels,
      datasets: [{ data: values, backgroundColor: CHART_COLOR, borderRadius: 4, barThickness: 16 }]
    }, {
      indexAxis: "y",
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${valueFmt(ctx.raw)}` } }
      },
      scales: {
        x: { ticks: tickStyle, grid: { color: "#e2e8f0" } },
        y: { ticks: tickStyle, grid: { display: false } }
      }
    });
  }

  function buildPage(entry, data, idx) {
    const {
      meta = {}, totales = {}, clientes_nuevos = {},
      genero = {}, rango_etario = [],
      clientes_por_clase = [], clientes_por_sublinea = [],
      venta_diaria = []
    } = data;

    const pageId = `page-${idx}`;
    const ids = {
      etario:   `ch-etario-${idx}`,
      diaria:   `ch-diaria-${idx}`,
      sublinea: `ch-sublinea-${idx}`,
      clase:    `ch-clase-${idx}`,
    };

    // ── Títulos orientados a conclusión, derivados de los datos ──
    const avgVenta = venta_diaria.length
      ? venta_diaria.reduce((s, d) => s + d.venta, 0) / venta_diaria.length
      : 0;
    const ventaTitulo = venta_diaria.length
      ? `Venta diaria — promedio de ${fmt.clpM(avgVenta)} por día`
      : "Venta diaria";

    const generoLider = (genero.mujeres_pct ?? 0) >= (genero.hombres_pct ?? 0)
      ? { lbl: "Mujeres", pct: genero.mujeres_pct }
      : { lbl: "Hombres", pct: genero.hombres_pct };
    const generoTitulo = `${generoLider.lbl} dominan la categoría — ${generoLider.pct}% de los clientes`;

    const nuevosCampana = clientes_nuevos.campana;
    const nuevosTitulo = nuevosCampana
      ? `${nuevosCampana.pct}% de los clientes son nuevos en la campaña`
      : "Clientes nuevos";

    const etarioTop = rango_etario.reduce((a, b) => (!a || b.pct > a.pct ? b : a), null);
    const etarioTitulo = etarioTop
      ? `Mayor concentración en ${etarioTop.rango} años — ${etarioTop.pct}% de los clientes`
      : "Rango etario";

    const sublineaTop = clientes_por_sublinea[0];
    const sublineaTitulo = sublineaTop
      ? `${sublineaTop.sublinea_desc} lidera la campaña — ${sublineaTop.pct}% de los clientes`
      : "Por sublínea";

    const claseTop = clientes_por_clase[0];
    const claseTitulo = claseTop
      ? `${claseTop.clase_desc} es la categoría líder — ${claseTop.pct}% de los clientes`
      : "Clientes por clase";

    const TOP_CLASES = 6;
    const clasesTop = [...clientes_por_clase]
      .sort((a, b) => b.clientes - a.clientes)
      .slice(0, TOP_CLASES);

    const nuevosHtml = Object.entries(clientes_nuevos).map(([k, v]) => `
      <div class="nuevo-stat">
        <div class="nuevo-stat-value">${fmt.num(v.n)}</div>
        <div class="nuevo-stat-pct">${v.pct}% del total</div>
        <div class="nuevo-stat-label">${v.label ?? k}</div>
      </div>`).join("");

    const page = document.createElement("div");
    page.className = "page" + (idx === 0 ? " active" : "");
    page.id = pageId;
    page.innerHTML = `
      <div class="page-header">
        <h2>${meta.campana || entry.label}</h2>
        <p>${meta.periodo || ""}</p>
      </div>

      <div class="hero-stats">
        <div class="hero-stat">
          <div class="hero-value">${fmt.num(totales.clientes)}</div>
          <div class="hero-label">Clientes</div>
        </div>
        <div class="hero-stat">
          <div class="hero-value">${fmt.clpM(totales.venta_total)}</div>
          <div class="hero-label">Venta total</div>
        </div>
        <div class="hero-stat">
          <div class="hero-value">${fmt.clp(totales.ticket_promedio)}</div>
          <div class="hero-label">Ticket promedio</div>
        </div>
        <div class="hero-stat">
          <div class="hero-value">${fmt.num(totales.clientes_f)}</div>
          <div class="hero-label">Clientes F</div>
        </div>
      </div>

      <div class="row-full">
        <div class="section">
          <div class="section-title">${ventaTitulo}</div>
          <canvas id="${ids.diaria}" height="100"></canvas>
        </div>
      </div>

      <div class="row">
        <div class="section">
          <div class="section-title">${generoTitulo}</div>
          <div class="gender-bar">
            <div class="gender-f" style="width:${genero.mujeres_pct ?? 50}%"></div>
            <div class="gender-m" style="width:${genero.hombres_pct ?? 50}%"></div>
          </div>
          <div class="gender-legend">
            <span><span class="gender-symbol" style="color:#f472b6">♀</span>Mujeres ${genero.mujeres_pct}%</span>
            <span><span class="gender-symbol" style="color:#38bdf8">♂</span>Hombres ${genero.hombres_pct}%</span>
          </div>
        </div>

        <div class="section">
          <div class="section-title">${nuevosTitulo}</div>
          <div class="nuevos-stats">${nuevosHtml}</div>
        </div>
      </div>

      <div class="row">
        <div class="section">
          <div class="section-title">${etarioTitulo}</div>
          <canvas id="${ids.etario}" height="170"></canvas>
        </div>
        <div class="section">
          <div class="section-title">${sublineaTitulo}</div>
          <canvas id="${ids.sublinea}" height="170"></canvas>
        </div>
      </div>

      <div class="row-full">
        <div class="section">
          <div class="section-title">${claseTitulo}</div>
          <canvas id="${ids.clase}" height="${Math.max(140, clasesTop.length * 38)}"></canvas>
        </div>
      </div>`;

    document.getElementById("pages").appendChild(page);

    requestAnimationFrame(() => {
      const tickStyle = { color: "#64748b", font: { size: 11 } };
      const gridColor = "#e2e8f0";

      if (venta_diaria.length) {
        makeChart(ids.diaria, "line", {
          labels: venta_diaria.map(d => fmtFecha(d.fecha)),
          datasets: [
            {
              data: venta_diaria.map(d => d.venta),
              borderColor: CHART_COLOR,
              backgroundColor: "rgba(0,168,89,0.10)",
              fill: true,
              tension: 0.35,
              pointRadius: 3,
              pointBackgroundColor: "#fff",
              pointBorderColor: CHART_COLOR,
              pointBorderWidth: 1.5,
              pointHoverRadius: 5,
            },
            {
              data: venta_diaria.map(() => avgVenta),
              borderColor: "#94a3b8",
              borderDash: [6, 4],
              borderWidth: 1.5,
              pointRadius: 0,
              fill: false,
              tension: 0,
            }
          ]
        }, {
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: {
              label: ctx => ctx.datasetIndex === 0
                ? " " + fmt.clp(ctx.raw)
                : ` Promedio: ${fmt.clp(ctx.raw)}`
            } }
          },
          scales: {
            x: {
              ticks: { ...tickStyle, maxRotation: 30, autoSkip: true, maxTicksLimit: 12 },
              grid: { color: gridColor }
            },
            y: {
              ticks: { ...tickStyle, callback: v => fmt.clpM(v) },
              grid: { color: gridColor }
            }
          }
        });
      }

      makeChart(ids.etario, "bar", {
        labels: rango_etario.map(r => r.rango),
        datasets: [{ data: rango_etario.map(r => r.pct), backgroundColor: CHART_COLOR, borderRadius: 4 }]
      }, {
        plugins: { legend: { display: false },
          tooltip: { callbacks: { label: ctx => ` ${ctx.raw}%` } } },
        scales: {
          x: { ticks: tickStyle, grid: { color: gridColor } },
          y: { ticks: { ...tickStyle, callback: v => v + "%" }, grid: { color: gridColor } }
        }
      });

      if (clientes_por_sublinea.length) {
        const sorted = [...clientes_por_sublinea].sort((a, b) => b.clientes - a.clientes);
        makeHBarChart(ids.sublinea,
          sorted.map(r => r.sublinea_desc),
          sorted.map(r => r.clientes),
          v => `${fmt.num(v)} clientes`);
      }

      if (clasesTop.length) {
        makeHBarChart(ids.clase,
          clasesTop.map(r => r.clase_desc),
          clasesTop.map(r => r.clientes),
          v => `${fmt.num(v)} clientes`);
      }
    });
  }

  function switchTab(idx) {
    document.querySelectorAll(".tab").forEach((t, i)  => t.classList.toggle("active", i === idx));
    document.querySelectorAll(".page").forEach((p, i) => p.classList.toggle("active", i === idx));
  }

  async function init() {
    try {
      const manifest = await fetch("manifest.json").then(r => {
        if (!r.ok) throw new Error(`manifest.json — HTTP ${r.status}`);
        return r.json();
      });

      document.getElementById("loading").remove();

      const tabsEl = document.getElementById("tabs");

      const results = await Promise.allSettled(
        manifest.map(e => fetch(e.path).then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.json();
        }))
      );

      results.forEach((result, idx) => {
        const entry = manifest[idx];

        const tab = document.createElement("button");
        tab.className = "tab" + (idx === 0 ? " active" : "");
        tab.textContent = entry.label;
        tab.onclick = () => switchTab(idx);
        tabsEl.appendChild(tab);

        if (result.status === "fulfilled") {
          buildPage(entry, result.value, idx);
        } else {
          const errPage = document.createElement("div");
          errPage.className = "page" + (idx === 0 ? " active" : "");
          errPage.id = `page-${idx}`;
          errPage.innerHTML = `<div class="status error">No se pudo cargar <code>${entry.path}</code><br/><small>${result.reason?.message}</small></div>`;
          document.getElementById("pages").appendChild(errPage);
        }
      });

    } catch (err) {
      document.getElementById("loading").innerHTML =
        `<span class="error">${err.message}</span>`;
    }
  }

  init();
</script>
</body>
</html>
