<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campaign Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f0f4f8;
      --surface:   #ffffff;
      --border:    #dde3ea;
      --text:      #1e293b;
      --muted:     #64748b;
      --accent:    #00a859;
      --accent-dim:#e6f6ee;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Topbar ─────────────────────────────────────── */
    .topbar {
      padding: 1.25rem 2rem 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .topbar h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 1rem;
      letter-spacing: -0.01em;
    }

    .tabs {
      display: flex;
      gap: 0;
      overflow-x: auto;
    }

    .tab {
      padding: 0.6rem 1.25rem;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Pages ──────────────────────────────────────── */
    .page { display: none; padding: 2rem; max-width: 1100px; margin: 0 auto; }
    .page.active { display: block; }

    .page-header { margin-bottom: 1.75rem; }
    .page-header h2 { font-size: 1.4rem; font-weight: 700; color: #1e293b; }
    .page-header p  { margin-top: 0.25rem; font-size: 0.82rem; color: var(--muted); }

    /* ── KPI row ────────────────────────────────────── */
    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
    }

    .kpi-value {
      font-size: 1.65rem;
      font-weight: 700;
      color: #1e293b;
      line-height: 1;
    }

    .kpi-label {
      margin-top: 0.35rem;
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Layout rows ────────────────────────────────── */
    .row      { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .row-full { margin-bottom: 1rem; }
    @media (max-width: 700px) { .row { grid-template-columns: 1fr; } }

    /* ── Cards ──────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
    }

    .card-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ── Gender bar ─────────────────────────────────── */
    .gender-bar {
      height: 28px;
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      margin-bottom: 0.65rem;
    }

    .gender-f { background: #f472b6; }
    .gender-m { background: #38bdf8; }

    .gender-legend { display: flex; gap: 1.25rem; font-size: 0.85rem; align-items: center; }

    .gender-symbol {
      font-size: 1.1rem;
      font-weight: 700;
      margin-right: 0.25rem;
      line-height: 1;
      vertical-align: middle;
    }

    /* ── Clientes nuevos accordion ──────────────────── */
    .accordion-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }

    .accordion-trigger {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0.9rem;
      background: var(--accent-dim);
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      color: #00875a;
      text-align: left;
    }

    .accordion-trigger:hover { background: #d4f0e3; }

    .accordion-arrow {
      font-size: 0.7rem;
      transition: transform 0.2s;
      color: var(--muted);
    }

    .accordion-trigger.open .accordion-arrow { transform: rotate(180deg); }

    .accordion-body {
      display: none;
      padding: 0.65rem 0.9rem;
      background: var(--surface);
    }

    .accordion-body.open { display: block; }

    .nuevo-val { font-size: 1.3rem; font-weight: 700; color: #00875a; }
    .nuevo-pct { font-size: 0.78rem; color: var(--muted); margin-top: 0.1rem; }
    .nuevo-lbl { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }

    /* ── Group list (clase / sublinea) ──────────────── */
    .group-accordion {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .group-trigger {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.7rem 1rem;
      background: #f8fafc;
      border: none;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .group-trigger:hover { background: #f1f5f9; }
    .group-trigger.open .accordion-arrow { transform: rotate(180deg); }

    .group-body {
      display: none;
      background: var(--surface);
    }

    .group-body.open { display: block; }

    .group-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.55rem 1rem;
      font-size: 0.82rem;
      border-bottom: 1px solid #f1f5f9;
    }

    .group-row:last-child { border-bottom: none; }

    .group-row-label { color: var(--text); }

    .group-row-value {
      font-weight: 600;
      color: #00875a;
      white-space: nowrap;
      margin-left: 1rem;
    }

    /* ── Status ─────────────────────────────────────── */
    .status { text-align: center; padding: 4rem; color: var(--muted); font-size: 0.875rem; }
    .error  { color: #f87171; }
  </style>
</head>
<body>

<div class="topbar">
  <h1>Campaign Dashboard</h1>
  <div class="tabs" id="tabs"></div>
</div>

<div id="pages">
  <div class="status" id="loading">Cargando campañas…</div>
</div>

<script>
  const fmt = {
    num: n => Number(n).toLocaleString("es-CL"),
    clp: n => "$" + Number(n).toLocaleString("es-CL"),
  };

  const CHART_COLOR = "#00a859";

  let chartInstances = [];

  function makeChart(id, type, data, options) {
    const chart = new Chart(document.getElementById(id), { type, data, options });
    chartInstances.push(chart);
    return chart;
  }

  function buildPage(entry, data, idx) {
    const {
      meta = {}, totales = {}, clientes_nuevos = {},
      genero = {}, rango_etario = [],
      clientes_por_clase = [], clientes_por_sublinea = []
    } = data;

    const pageId = `page-${idx}`;
    const ids = {
      etario: `ch-etario-${idx}`
    };

    const nuevosHtml = Object.entries(clientes_nuevos).map(([k, v], i) => `
      <div class="accordion-item">
        <button class="accordion-trigger" onclick="toggleAccordion(this)">
          <span>${v.label ?? k}</span>
          <span class="accordion-arrow">▼</span>
        </button>
        <div class="accordion-body">
          <div class="nuevo-val">${fmt.num(v.n)}</div>
          <div class="nuevo-pct">${v.pct}% del total</div>
        </div>
      </div>`).join("");

    const page = document.createElement("div");
    page.className = "page" + (idx === 0 ? " active" : "");
    page.id = pageId;
    page.innerHTML = `
      <div class="page-header">
        <h2>${meta.campana || entry.label}</h2>
        <p>${meta.periodo || ""}</p>
      </div>

      <div class="kpis">
        <div class="kpi">
          <div class="kpi-value">${fmt.num(totales.clientes)}</div>
          <div class="kpi-label">Clientes</div>
        </div>
        <div class="kpi">
          <div class="kpi-value">${fmt.clp(totales.venta_total)}</div>
          <div class="kpi-label">Venta Total</div>
        </div>
        <div class="kpi">
          <div class="kpi-value">${fmt.clp(totales.ticket_promedio)}</div>
          <div class="kpi-label">Ticket Promedio</div>
        </div>
        <div class="kpi">
          <div class="kpi-value">${fmt.num(totales.clientes_f)}</div>
          <div class="kpi-label">Clientes F</div>
        </div>
      </div>

      <div class="row">
        <div class="card">
          <div class="card-title">Género</div>
          <div class="gender-bar">
            <div class="gender-f" style="width:${genero.mujeres_pct ?? 50}%"></div>
            <div class="gender-m" style="width:${genero.hombres_pct ?? 50}%"></div>
          </div>
          <div class="gender-legend">
            <span><span class="gender-symbol" style="color:#f472b6">♀</span>Mujeres ${genero.mujeres_pct}%</span>
            <span><span class="gender-symbol" style="color:#38bdf8">♂</span>Hombres ${genero.hombres_pct}%</span>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Clientes Nuevos</div>
          <div>${nuevosHtml}</div>
        </div>
      </div>

      <div class="row">
        <div class="card">
          <div class="card-title">Rango Etario</div>
          <canvas id="${ids.etario}" height="180"></canvas>
        </div>
        <div class="card">
          <div class="card-title">Por Sublínea</div>
          <div class="group-accordion">
            <button class="group-trigger" onclick="toggleAccordion(this)">
              <span>${clientes_por_sublinea.length} sublíneas</span>
              <span class="accordion-arrow">▼</span>
            </button>
            <div class="group-body">
              ${clientes_por_sublinea.map(r => `
                <div class="group-row">
                  <span class="group-row-label">${r.sublinea_desc}</span>
                  <span class="group-row-value">${fmt.num(r.clientes)}</span>
                </div>`).join("")}
            </div>
          </div>
        </div>
      </div>

      <div class="row-full">
        <div class="card">
          <div class="card-title">Clientes por Clase</div>
          <div class="group-accordion">
            <button class="group-trigger" onclick="toggleAccordion(this)">
              <span>${clientes_por_clase.length} clases</span>
              <span class="accordion-arrow">▼</span>
            </button>
            <div class="group-body">
              ${clientes_por_clase.map(r => `
                <div class="group-row">
                  <span class="group-row-label">${r.clase_desc}</span>
                  <span class="group-row-value">${fmt.num(r.clientes)}</span>
                </div>`).join("")}
            </div>
          </div>
        </div>
      </div>`;

    document.getElementById("pages").appendChild(page);

    requestAnimationFrame(() => {
      const tickStyle = { color: "#64748b", font: { size: 11 } };
      const gridColor = "#e2e8f0";

      makeChart(ids.etario, "bar", {
        labels: rango_etario.map(r => r.rango),
        datasets: [{ data: rango_etario.map(r => r.pct), backgroundColor: CHART_COLOR, borderRadius: 4 }]
      }, {
        plugins: { legend: { display: false },
          tooltip: { callbacks: { label: ctx => ` ${ctx.raw}%` } } },
        scales: {
          x: { ticks: tickStyle, grid: { color: gridColor } },
          y: { ticks: { ...tickStyle, callback: v => v + "%" }, grid: { color: gridColor } }
        }
      });

    });
  }

  function toggleAccordion(btn) {
    const body = btn.nextElementSibling;
    const isOpen = body.classList.contains("open");
    btn.classList.toggle("open", !isOpen);
    body.classList.toggle("open", !isOpen);
  }

  function switchTab(idx) {
    document.querySelectorAll(".tab").forEach((t, i)  => t.classList.toggle("active", i === idx));
    document.querySelectorAll(".page").forEach((p, i) => p.classList.toggle("active", i === idx));
  }

  async function init() {
    try {
      const manifest = await fetch("manifest.json").then(r => {
        if (!r.ok) throw new Error(`manifest.json — HTTP ${r.status}`);
        return r.json();
      });

      document.getElementById("loading").remove();

      const tabsEl = document.getElementById("tabs");

      const results = await Promise.allSettled(
        manifest.map(e => fetch(e.path).then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.json();
        }))
      );

      results.forEach((result, idx) => {
        const entry = manifest[idx];

        const tab = document.createElement("button");
        tab.className = "tab" + (idx === 0 ? " active" : "");
        tab.textContent = entry.label;
        tab.onclick = () => switchTab(idx);
        tabsEl.appendChild(tab);

        if (result.status === "fulfilled") {
          buildPage(entry, result.value, idx);
        } else {
          const errPage = document.createElement("div");
          errPage.className = "page" + (idx === 0 ? " active" : "");
          errPage.id = `page-${idx}`;
          errPage.innerHTML = `<div class="status error">No se pudo cargar <code>${entry.path}</code><br/><small>${result.reason?.message}</small></div>`;
          document.getElementById("pages").appendChild(errPage);
        }
      });

    } catch (err) {
      document.getElementById("loading").innerHTML =
        `<span class="error">${err.message}</span>`;
    }
  }

  init();
</script>
</body>
</html>
