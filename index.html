<script>
let DATA = {};
let EDAD = [];
let GSE = [];
let TIPO = [];
let ZONAS = [];
let GENERO = [];
let ALL = [];
let curF = 'all';

const tip = document.getElementById('tip');

// ─── DATA LOADER ────────────────────────────
async function loadData() {
  const res = await fetch('./data.json');

  if (!res.ok) {
    throw new Error('No se pudo cargar data.json');
  }

  DATA = await res.json();

  EDAD = DATA.edad || [];
  GSE = DATA.gse || [];
  TIPO = DATA.tipo || [];
  ZONAS = DATA.zonas || [];
  GENERO = DATA.genero || [];

  ALL = [
    ...GENERO,
    ...EDAD,
    ...ZONAS,
    ...GSE,
    ...TIPO
  ]
    .map(r => ({
      l: r.l,
      d: +(r.c - r.k).toFixed(1)
    }))
    .sort((a, b) => b.d - a.d);

  updateHeader();
  renderKPIs();
  renderGender();
  renderBars('edad-bars', EDAD);
  renderBars('gse-bars', GSE, true);
  renderBars('tipo-bars', TIPO, true);
  renderDelta();

  setTimeout(animBars, 200);

  const mujer = GENERO.find(x => x.l.toLowerCase().includes('mujer'));
  const hombre = GENERO.find(x => x.l.toLowerCase().includes('hombre'));

  if (mujer) animPerson('crect-f', mujer.c / 100);
  if (hombre) animPerson('crect-m', hombre.c / 100);
}

// ─── HEADER ─────────────────────────────────
function updateHeader() {
  if (DATA.titulo) {
    document.querySelector('.htitle').textContent = DATA.titulo;
  }

  if (DATA.subtitulo) {
    document.querySelector('.hsub').textContent = DATA.subtitulo;
  }

  if (DATA.comparativo) {
    document.querySelector('.badge').textContent = DATA.comparativo;
  }
}

// ─── KPIs ───────────────────────────────────
function renderKPIs() {
  if (!DATA.kpis) return;

  const grid = document.querySelector('.kpi-grid');

  grid.innerHTML = DATA.kpis.map(k => {
    const chip = k.variacion
      ? `<span class="chip ${k.tipo || 'up'}">${k.variacion}</span>`
      : '';

    return `
      <div class="kpi">
        <div class="klbl">${k.label}</div>
        <div class="kval">${k.valor}</div>
        <div class="kcmp">${chip}${k.detalle || ''}</div>
        <div class="kbar-bg">
          <div class="kbar-fg" style="width:0" data-w="${k.barra || 0}"></div>
        </div>
      </div>
    `;
  }).join('');
}

// ─── GÉNERO ─────────────────────────────────
function renderGender() {
  const mujer = GENERO.find(x => x.l.toLowerCase().includes('mujer'));
  const hombre = GENERO.find(x => x.l.toLowerCase().includes('hombre'));

  if (mujer) {
    document.querySelector('.g-pct.f').textContent = `${mujer.c.toFixed(0)}%`;
    document.querySelector('.gp:first-child .g-name').textContent = mujer.l;

    const d = +(mujer.c - mujer.k).toFixed(1);
    const pillClass = d >= 0 ? 'pos' : 'neg';
    const sign = d >= 0 ? '+' : '';

    document.querySelector('.gp:first-child .g-comp').innerHTML =
      `Comp: ${mujer.k.toFixed(1)}%&nbsp;<span class="dpill ${pillClass}">${sign}${d} pp</span>`;
  }

  if (hombre) {
    document.querySelector('.g-pct.m').textContent = `${hombre.c.toFixed(0)}%`;
    document.querySelector('.gp:nth-child(2) .g-name').textContent = hombre.l;

    const d = +(hombre.c - hombre.k).toFixed(1);
    const pillClass = d >= 0 ? 'pos' : 'neg';
    const sign = d >= 0 ? '+' : '';

    document.querySelector('.gp:nth-child(2) .g-comp').innerHTML =
      `Comp: ${hombre.k.toFixed(1)}%&nbsp;<span class="dpill ${pillClass}">${sign}${d} pp</span>`;
  }
}

// ─── TOOLTIP ────────────────────────────────
document.addEventListener('mousemove', e => {
  if (tip.style.opacity === '1') {
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top = (e.clientY - 10) + 'px';
  }
});

function showT(e, h) {
  tip.innerHTML = h;
  tip.style.opacity = '1';
  tip.style.left = (e.clientX + 14) + 'px';
  tip.style.top = (e.clientY - 10) + 'px';
}

function hideT() {
  tip.style.opacity = '0';
}

// ─── BARRAS DOBLES ──────────────────────────
function renderBars(id, rows, narrow = false) {
  const el = document.getElementById(id);
  if (!el) return;

  if (!rows.length) {
    el.innerHTML = '';
    return;
  }

  const max = Math.max(...rows.flatMap(r => [r.c, r.k]));

  el.innerHTML = rows.map(r => {
    const cw = (r.c / max * 100).toFixed(1);
    const kw = (r.k / max * 100).toFixed(1);
    const d = +(r.c - r.k).toFixed(1);
    const s = d > 0 ? '+' : '';

    return `
      <div class="br${narrow ? ' w70' : ''}">
        <div class="blbl" title="${r.l}">${r.l}</div>
        <div class="btrack"
          onmouseenter="showT(event,'<b>${r.l}</b><br>Campaña: ${r.c.toFixed(1)}%<br>Comp: ${r.k.toFixed(1)}%<br>Δ: ${s}${d} pp')"
          onmouseleave="hideT()">
          <div class="bcomp" style="width:0%" data-w="${kw}"></div>
          <div class="bcamp" style="width:0%" data-w="${cw}"></div>
        </div>
        <div class="bpct">${r.c.toFixed(0)}%</div>
      </div>
    `;
  }).join('');
}

// ─── DELTA CHART ────────────────────────────
function setF(f, btn) {
  curF = f;

  document.querySelectorAll('.dtab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  renderDelta();
}

function renderDelta() {
  const el = document.getElementById('delta-chart');
  if (!el) return;

  const rows = ALL.filter(r =>
    curF === 'all' ? true :
    curF === 'pos' ? r.d > 0 :
    r.d < 0
  );

  if (!rows.length) {
    el.innerHTML = '';
    return;
  }

  const mx = Math.max(...ALL.map(r => Math.abs(r.d))) || 1;

  el.innerHTML = rows.map(r => {
    const pct = (Math.abs(r.d) / mx * 44).toFixed(1);
    const pos = r.d >= 0;
    const s = pos ? '+' : '';

    return `
      <div class="drow">
        <div class="dlbl" title="${r.l}">${r.l}</div>
        <div class="dtrack">
          <div class="daxis"></div>
          <div class="dbar ${pos ? 'pos' : 'neg'}" style="width:0%" data-w="${pct}%"></div>
        </div>
        <div class="dval ${pos ? 'pos' : 'neg'}">${s}${r.d}</div>
      </div>
    `;
  }).join('');

  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.querySelectorAll('.dbar[data-w]').forEach(e => {
      e.style.width = e.dataset.w;
    });
  }));
}

// ─── ANIMACIONES ────────────────────────────
function animBars() {
  document.querySelectorAll('.kbar-fg[data-w]').forEach(e => {
    e.style.width = e.dataset.w + '%';
  });

  document.querySelectorAll('.bcomp[data-w], .bcamp[data-w]').forEach(e => {
    e.style.width = e.dataset.w + '%';
  });
}

function animPerson(id, pct) {
  const el = document.getElementById(id);
  if (!el) return;

  const H = 134;
  const endH = H * pct;
  const start = performance.now();
  const dur = 1300;

  function step(now) {
    const t = Math.min((now - start) / dur, 1);
    const e = t < .5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    const h = endH * e;

    el.setAttribute('y', (H - h).toFixed(2));
    el.setAttribute('height', h.toFixed(2));

    if (t < 1) requestAnimationFrame(step);
  }

  setTimeout(() => requestAnimationFrame(step), 300);
}

// ─── INIT ───────────────────────────────────
loadData().catch(err => {
  console.error(err);
  document.body.insertAdjacentHTML(
    'afterbegin',
    `<div style="background:#FDECEA;color:#D93025;padding:12px 24px;font-family:DM Sans,sans-serif">
      Error cargando data.json. Revisa que exista en la misma carpeta que index.html.
    </div>`
  );
});
</script>
